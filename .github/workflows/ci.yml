name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: make fmt-check

      - name: Lint frontend
        run: make lint-frontend

      - name: Create embed placeholder for linter
        run: mkdir -p internal/handler/frontend && echo '<!DOCTYPE html>' > internal/handler/frontend/index.html

      - name: Lint backend
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: make test

  e2e:
    name: E2E tests
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps and Playwright browsers
        run: cd frontend && npm ci && npx playwright install --with-deps chromium

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: make e2e
