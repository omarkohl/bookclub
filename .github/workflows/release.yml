name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: Verify CI
    uses: ./.github/workflows/ci.yml

  binaries:
    name: Build binaries
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build frontend and copy to embed dir
        run: |
          make build-frontend
          mkdir -p internal/handler/frontend
          cp -r frontend/dist/* internal/handler/frontend/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null | sed 's/^v//' | sed 's/-[0-9]*-g\([a-f0-9]*\)/-dev+\1/' || echo "dev")
          BUILD_DATE=$(date -u +%Y-%m-%d)
          go build -ldflags="-s -w -X 'main.Version=$VERSION' -X 'main.BuildDate=$BUILD_DATE'" -o bookclub-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/bookclub

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bookclub-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bookclub-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  github-release:
    name: Create GitHub release
    needs: binaries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk "/^## \[${version}\]/{found=1; next} found && /^## /{exit} found && /^\[/{exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: bookclub-*
          body_path: release_notes.md

  docker:
    name: Build and push Docker image
    needs: ci
    runs-on: ubuntu-latest
    environment: release env
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/bookclub
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute version info
        id: version
        run: |
          echo "version=$(git describe --tags --always 2>/dev/null | sed 's/^v//' | sed 's/-[0-9]*-g\([a-f0-9]*\)/-dev+\1/' || echo "dev")" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ steps.version.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
