version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      all-dependencies:
        patterns:
          - "*"
    ignore:
      # eslint-plugin-react not yet compatible with eslint 10 (issue #19)
      - dependency-name: "eslint"
        versions: [">= 10"]
      - dependency-name: "@eslint/js"
        versions: [">= 10"]
